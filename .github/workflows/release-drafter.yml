name: Release Drafter

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
